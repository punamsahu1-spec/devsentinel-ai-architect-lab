name: DevSentinel CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover tests

  pr-security-scan:
    name: DevSentinel PR Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create PR diff file
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Generated PR diff:"
          wc -l pr_diff.txt

      - name: Run DevSentinel PR scan
        id: devsentinel_scan
        continue-on-error: true
        run: |
          python -m app.pr_scanner pr_diff.txt

      - name: Build PR comment
        run: |
          python -m app.pr_comment_builder

      - name: Post DevSentinel PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: devsentinel-security-review
          path: devsentinel_pr_comment.md

      - name: Fail workflow if DevSentinel blocked PR
        if: steps.devsentinel_scan.outcome == 'failure'
        run: |
          echo "DevSentinel blocked this PR."
          exit 1